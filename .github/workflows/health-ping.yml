name: Health Ping

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -s https://dsce-canteen-backend.onrender.com/health > /dev/null
          echo "Pinged at $(date)"
